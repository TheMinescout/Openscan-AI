name: Android Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          
      - name: Build with Gradle
        run: |
          cd android-app
          # Ensure the wrapper exists and is executable
          if [ ! -f "gradlew" ]; then
            echo "Error: gradlew not found in android-app/ directory. Please check your file structure."
            exit 1
          fi
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenScan-AI-Debug-APK
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
