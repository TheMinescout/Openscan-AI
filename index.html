<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenScan-AI Web Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div id="app-container">
        <div class="top-bar">
            <button id="delete-last-btn" class="icon-btn">🗑️</button>
            <div id="status-msg">Loading AI...</div>
            <button id="export-btn" class="text-btn">Save PDF</button>
        </div>

        <video id="video-feed" autoplay playsinline muted></video>
        <canvas id="overlay-canvas"></canvas>
        <div id="freeze-layer"></div>

        <div class="controls">
            <div id="gallery-trigger" class="thumbnail-preview">
                <img id="last-scan-img" style="display:none;">
                <span id="scan-count">0</span>
            </div>
            <button id="capture-btn"></button>
            <div class="spacer"></div>
        </div>

        <div id="crop-modal" class="modal">
            <div class="modal-header">
                <button id="cancel-crop">Retake</button>
                <span>Adjust Corners</span>
                <button id="done-crop" class="primary-text">Warp & Keep</button>
            </div>
            <div class="crop-container" id="crop-ui-container">
                <canvas id="crop-canvas"></canvas>
                <div id="handle-0" class="crop-handle" data-id="0"></div>
                <div id="handle-1" class="crop-handle" data-id="1"></div>
                <div id="handle-2" class="crop-handle" data-id="2"></div>
                <div id="handle-3" class="crop-handle" data-id="3"></div>
            </div>
        </div>
    </div>
    <canvas id="hidden-canvas" style="display:none;"></canvas>
    <script src="js/app.js"></script>
</body>
</html>
