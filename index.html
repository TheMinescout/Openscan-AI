<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OpenScan-AI Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <link rel="stylesheet" href="css/style.css">

    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div id="app-container">
        <video id="video-feed" autoplay playsinline muted></video>
        
        <canvas id="overlay-canvas"></canvas>

        <div id="focus-ring"></div>

        <div class="ui-layer">
            <div class="top-nav">
                <button id="auto-toggle" class="glass-pill">
                    Auto: <span style="color: #00FF00;">ON</span>
                </button>
                
                <div id="status-msg" class="status-pill">Initializing...</div>
                
                <button id="settings-btn" class="glass-btn" title="Settings">⚙️</button>
            </div>

            <div class="bottom-nav">
                <div id="gallery-trigger" class="preview-box">
                    <img id="last-scan-img" src="" style="display:none;">
                    <div id="scan-count">0</div>
                </div>

                <div class="shutter-outer">
                    <svg class="progress-ring" width="84" height="84">
                        <circle class="progress-ring__circle" stroke="#007AFF" stroke-width="4" fill="transparent" r="38" cx="42" cy="42"/>
                    </svg>
                    <button id="capture-btn" aria-label="Capture"></button>
                </div>

                <button id="export-btn" class="glass-btn primary-action">PDF</button>
            </div>
        </div>

        <div id="freeze-layer"></div>

        <div id="crop-modal" class="modal">
            <div class="modal-header">
                <button id="cancel-crop">Retake</button>
                <span class="modal-title">Adjust Corners</span>
                <button id="done-crop" class="primary-text">Keep</button>
            </div>
            <div class="crop-container" id="crop-ui-container">
                <canvas id="crop-canvas"></canvas>
                <div class="crop-handle"></div><div class="crop-handle"></div>
                <div class="crop-handle"></div><div class="crop-handle"></div>
            </div>
        </div>

        <div id="gallery-modal" class="modal">
            <div class="modal-header">
                <button id="close-gallery">← Back</button>
                <span class="modal-title">Scanned Pages</span>
                <div style="width: 30px;"></div>
            </div>
            <div id="gallery-grid" class="gallery-grid"></div>
        </div>

        <div id="editor-modal" class="modal" style="background: #111;">
            <div class="modal-header">
                <button id="close-editor">Done</button>
                <span class="modal-title">Edit Page</span>
                <div style="width: 30px;"></div>
            </div>
            <div class="editor-view"><img id="editor-img" src=""></div>
            <div class="editor-toolbar">
                <button class="edit-btn" onclick="applyFilter('original')"><span>🎨</span><label>Original</label></button>
                <button class="edit-btn" onclick="applyFilter('bw')"><span>📄</span><label>B&W</label></button>
                <button class="edit-btn" onclick="rotateImage()"><span>🔄</span><label>Rotate</label></button>
                <button class="edit-btn destuctive" id="delete-page-btn"><span>🗑️</span><label>Delete</label></button>
            </div>
        </div>

        <div id="settings-modal" class="modal">
            <div class="modal-header">
                <button id="close-settings">Done</button>
                <span class="modal-title">Settings</span>
                <div style="width: 30px;"></div>
            </div>
            <div class="settings-content" style="padding: 20px; color: white;">
                <div class="setting-item"><label>High Res</label><input type="checkbox" checked></div>
                <hr style="border-color: #333; margin: 15px 0;">
                <button id="about-btn" class="menu-btn" style="margin-top: 30px;">About & Donate ❤️</button>
            </div>
        </div>

        <div id="about-modal" class="modal" style="z-index: 200;">
            <div class="modal-header">
                <button id="close-about">Close</button>
                <span class="modal-title">About Us</span>
                <div style="width: 30px;"></div>
            </div>
            <div class="about-content" style="padding: 30px; text-align: center; color: white;">
                <h1>OpenScan AI</h1>
                <p style="color: #aaa; margin-bottom: 30px;">Privacy-focused scanner.</p>
                <div class="donate-section" style="background: #222; padding: 20px; border-radius: 15px;">
                    <a href="https://buymeacoffee.com/theminescout" target="_blank" class="donate-btn">☕ Buy Me a Coffee</a>
                </div>
            </div>
        </div>

    </div>
    <canvas id="hidden-canvas" style="display:none;"></canvas>
    <script src="js/app.js"></script>
</body>
</html>
