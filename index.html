<div id="app-container">
    <video id="video-feed" autoplay playsinline muted></video>
    <canvas id="overlay-canvas"></canvas>

    <div class="ui-layer">
        <div class="top-nav">
            <button id="delete-last-btn" class="glass-btn" title="Delete Last">🗑️</button>
            <div id="status-msg">Ready</div>
            <button id="settings-btn" class="glass-btn">⚙️</button>
        </div>

        <div class="bottom-nav">
            <div id="gallery-trigger" class="preview-box">
                <img id="last-scan-img" src="" style="display:none;">
                <span id="scan-count">0</span>
            </div>

            <div class="shutter-outer">
                <button id="capture-btn"></button>
            </div>

            <div class="mode-indicator">
                <span>AUTO</span>
            </div>
        </div>
    </div>

    <div id="freeze-layer"></div>
</div>
