<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OpenScan-AI Pro</title>
    <meta name="theme-color" content="#141218">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- Icons & Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/style.css">

    <!-- Libraries -->
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
</head>
<body>
    <div id="app-container">
        <!-- Camera View -->
        <video id="video-feed" autoplay playsinline muted></video>
        <canvas id="overlay-canvas"></canvas>

        <!-- UI Overlay -->
        <div class="ui-layer">
            <div class="top-bar">
                <button id="settings-btn" class="icon-btn material-symbols-outlined">settings</button>
                <div id="auto-toggle" class="chip">
                    <span class="material-symbols-outlined">shutter_speed</span>
                    <span id="auto-text">Auto: ON</span>
                </div>
                <div class="status-pill" id="status-msg">Initializing...</div>
            </div>

            <div class="bottom-bar">
                <div class="bar-left">
                    <div id="gallery-trigger" class="thumbnail-btn">
                        <span class="material-symbols-outlined placeholder-icon">photo_library</span>
                        <img id="last-scan-img" src="" style="display:none;">
                        <span id="scan-count" class="badge" style="display:none;">0</span>
                    </div>
                </div>
                <div class="bar-center">
                    <div class="shutter-container">
                        <svg class="progress-ring" width="88" height="88">
                            <circle class="progress-ring__circle" stroke="#D0BCFF" stroke-width="4" fill="transparent" r="40" cx="44" cy="44"/>
                        </svg>
                        <button id="capture-btn"></button>
                    </div>
                </div>
                <div class="bar-right">
                    <button id="export-btn" class="fab-small">
                        <span class="material-symbols-outlined">picture_as_pdf</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Visual Flash Effect -->
        <div id="flash-layer"></div>

        <!-- CROP MODAL -->
        <div id="crop-modal" class="modal-sheet">
            <div class="sheet-header">
                <button id="cancel-crop" class="text-btn">Retake</button>
                <span class="sheet-title">Adjust Corners</span>
                <button id="done-crop" class="text-btn primary">Save</button>
            </div>
            <div class="crop-area">
                <div class="crop-container" id="crop-ui-container">
                    <canvas id="crop-canvas"></canvas>
                    <div class="crop-handle" data-id="0"></div>
                    <div class="crop-handle" data-id="1"></div>
                    <div class="crop-handle" data-id="2"></div>
                    <div class="crop-handle" data-id="3"></div>
                </div>
            </div>
        </div>

        <!-- EDITOR MODAL -->
        <div id="editor-modal" class="modal-sheet full-height">
            <div class="sheet-header">
                <button id="close-editor" class="icon-btn material-symbols-outlined">arrow_back</button>
                <span class="sheet-title">Editor</span>
                <button id="save-editor" class="text-btn primary">Done</button>
            </div>
            <div class="editor-view"><img id="editor-img" src=""></div>
            <div class="editor-suite">
                <div class="scroll-toolbar">
                    <button class="tool-btn" onclick="app.applyFilter('magic')">
                        <span class="material-symbols-outlined icon-box" style="color:#D0BCFF;">auto_fix_high</span><label>Magic</label>
                    </button>
                    <button class="tool-btn" onclick="app.applyFilter('bw')">
                        <span class="material-symbols-outlined icon-box">contrast</span><label>B&W</label>
                    </button>
                    <button class="tool-btn" onclick="app.applyFilter('original')">
                        <span class="material-symbols-outlined icon-box">restart_alt</span><label>Reset</label>
                    </button>
                    <div class="divider"></div>
                    <button class="tool-btn" onclick="app.rotateImage(90)">
                        <span class="material-symbols-outlined icon-box">rotate_right</span><label>Rotate</label>
                    </button>
                    <button class="tool-btn" onclick="app.extractText()">
                        <span class="material-symbols-outlined icon-box">text_snippet</span><label>OCR</label>
                    </button>
                    <div class="divider"></div>
                    <button class="tool-btn destuctive" onclick="app.deleteCurrentPage()">
                        <span class="material-symbols-outlined icon-box" style="background:#3b1f1f; color:#ffb4ab;">delete</span><label>Delete</label>
                    </button>
                </div>
            </div>
        </div>

        <!-- SETTINGS MODAL -->
        <div id="settings-modal" class="modal-sheet">
            <div class="sheet-drag-handle"></div>
            <div class="sheet-content">
                <h2>Settings</h2>
                <div class="list-item">
                    <div class="list-text"><span class="list-title">Camera Resolution</span></div>
                    <select id="quality-select" class="m3-select">
                        <option value="4k">4K (Experimental)</option>
                        <option value="1080p" selected>1080p (Best)</option>
                        <option value="720p">720p (Fast)</option>
                    </select>
                </div>
                <button id="close-settings" class="btn-filled" style="margin-top:10px;">Done</button>
            </div>
        </div>

        <!-- OCR RESULT MODAL -->
        <div id="text-result-modal" class="modal-sheet full-height">
            <div class="sheet-header">
                <button onclick="document.getElementById('text-result-modal').style.display='none'" class="icon-btn material-symbols-outlined">close</button>
                <span class="sheet-title">Extracted Text</span>
                <button onclick="app.copyOCRText()" class="text-btn primary">Copy</button>
            </div>
            <div class="sheet-content full-height"><textarea id="ocr-result-area" class="m3-textarea"></textarea></div>
        </div>
        
        <!-- GALLERY MODAL -->
        <div id="gallery-modal" class="modal-sheet full-height">
             <div class="sheet-header">
                <button id="close-gallery" class="icon-btn material-symbols-outlined">arrow_back</button>
                <span class="sheet-title">All Scans</span>
                <div style="width: 48px;"></div>
            </div>
            <div id="gallery-grid" class="gallery-grid"></div>
        </div>

    </div>
    
    <!-- Hidden processing canvas -->
    <canvas id="proc-canvas" style="display:none;"></canvas>

    <script src="js/app.js"></script>
</body>
</html>
