<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minescout Scanner</title>
    <meta name="theme-color" content="#5d8c58">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/style.css">

    <!-- Libraries -->
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
</head>
<body>

    <!-- === APP CONTAINER === -->
    <main id="app">
        
        <!-- 1. HOME DASHBOARD -->
        <section id="view-home" class="view active">
            <div class="header-glass">
                <div class="brand-section">
                    <div class="logo-circle">M</div>
                    <span class="site-title" style="color:var(--md-on-surface); font-size:1.2rem;">Scanner</span>
                </div>
                <button id="btn-logout" class="icon-btn hidden"><span class="material-symbols-outlined">logout</span></button>
            </div>
            
            <div class="container-padded">
                <div class="welcome-card">
                    <h2>Capture Documents</h2>
                    <p>Professional scanning powered by AI.</p>
                    <button class="btn-filled" onclick="app.router.go('scanner')">
                        <span class="material-symbols-outlined">photo_camera</span> Start Scan
                    </button>
                </div>

                <h3 class="section-title">Quick Actions</h3>
                <div class="action-grid">
                    <div class="card-action" onclick="app.router.go('history')">
                        <span class="material-symbols-outlined">history</span>
                        <span>History</span>
                    </div>
                    <div class="card-action" onclick="document.getElementById('file-upload').click()">
                        <span class="material-symbols-outlined">upload_file</span>
                        <span>Import</span>
                        <input type="file" id="file-upload" hidden accept="image/*">
                    </div>
                </div>
            </div>
        </section>

        <!-- 2. SCANNER INTERFACE -->
        <section id="view-scanner" class="view">
            <video id="video-feed" autoplay playsinline muted></video>
            <canvas id="overlay-canvas"></canvas>
            
            <div class="scanner-ui">
                <div class="scanner-top">
                    <button class="icon-btn glass" onclick="app.router.go('home')"><span class="material-symbols-outlined">arrow_back</span></button>
                    <div id="auto-chip" class="chip-glass active">
                        <span class="material-symbols-outlined">shutter_speed</span> Auto
                    </div>
                    <button class="icon-btn glass" onclick="app.camera.toggleFlash()"><span class="material-symbols-outlined">flash_on</span></button>
                </div>

                <div class="status-pill" id="scan-status">Looking for document...</div>

                <div class="scanner-bottom">
                    <div class="gallery-preview" onclick="app.router.go('history')">
                        <img id="last-scan-thumb" src="">
                    </div>
                    <div class="shutter-ring">
                        <button id="shutter-btn"></button>
                        <svg class="progress-ring" width="80" height="80">
                            <circle class="progress-ring__circle" stroke="#5d8c58" stroke-width="4" fill="transparent" r="36" cx="40" cy="40"/>
                        </svg>
                    </div>
                    <button class="icon-btn glass" onclick="app.camera.switchCamera()"><span class="material-symbols-outlined">cameraswitch</span></button>
                </div>
            </div>
        </section>

        <!-- 3. HISTORY / ACCOUNT -->
        <section id="view-history" class="view">
            <div class="header-glass">
                <span class="site-title" style="color:var(--md-on-surface);">Library</span>
                <div style="width:40px;"></div>
            </div>
            
            <div class="container-padded" id="auth-gate">
                <div class="login-card">
                    <span class="material-symbols-outlined icon-large">cloud_off</span>
                    <h3>Sync your Scans</h3>
                    <p>Log in to save your documents to the cloud.</p>
                    <input type="email" id="email-in" placeholder="Email" class="input-md">
                    <input type="password" id="pass-in" placeholder="Password" class="input-md">
                    <div class="btn-group">
                        <button id="btn-login" class="btn-filled">Log In</button>
                        <button id="btn-signup" class="btn-tonal">Sign Up</button>
                    </div>
                </div>
            </div>

            <div id="history-content" class="container-padded hidden">
                <div class="user-chip">
                    <span class="material-symbols-outlined">account_circle</span>
                    <span id="user-email">user@email.com</span>
                </div>
                <div id="scan-grid" class="posts-grid view-2">
                    <!-- Scans injected here -->
                </div>
            </div>
        </section>

        <!-- 4. STANDALONE EDITOR -->
        <section id="view-editor" class="view">
            <div class="header-glass">
                <button class="icon-btn" onclick="app.router.back()"><span class="material-symbols-outlined">arrow_back</span></button>
                <span class="site-title">Editor</span>
                <button class="btn-filled small" onclick="app.editor.save()">Save</button>
            </div>
            
            <div class="editor-canvas-container">
                <img id="edit-target" src="">
                <canvas id="crop-overlay"></canvas> <!-- For crop handles -->
            </div>

            <div class="editor-tools">
                <div class="tool-scroller">
                    <button class="tool-btn" onclick="app.editor.applyFilter('magic')"><span class="material-symbols-outlined">auto_fix_high</span>Magic</button>
                    <button class="tool-btn" onclick="app.editor.applyFilter('bw')"><span class="material-symbols-outlined">contrast</span>B&W</button>
                    <button class="tool-btn" onclick="app.editor.startCrop()"><span class="material-symbols-outlined">crop</span>Crop</button>
                    <button class="tool-btn" onclick="app.editor.rotate()"><span class="material-symbols-outlined">rotate_right</span>Rotate</button>
                    <button class="tool-btn" onclick="app.editor.exportPDF()"><span class="material-symbols-outlined">picture_as_pdf</span>PDF</button>
                    <button class="tool-btn danger" onclick="app.editor.delete()"><span class="material-symbols-outlined">delete</span>Delete</button>
                </div>
            </div>
        </section>

    </main>

    <!-- NAVIGATION BAR (Persistent) -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-target="home" onclick="app.router.go('home')">
            <span class="material-symbols-outlined">home</span>
            <span class="label">Home</span>
        </button>
        <button class="nav-item fab-holder" onclick="app.router.go('scanner')">
            <div class="fab"><span class="material-symbols-outlined">photo_camera</span></div>
        </button>
        <button class="nav-item" data-target="history" onclick="app.router.go('history')">
            <span class="material-symbols-outlined">photo_library</span>
            <span class="label">Files</span>
        </button>
    </nav>

    <!-- Hidden Processing Canvas -->
    <canvas id="proc-canvas" style="display:none;"></canvas>
    
    <script type="module" src="js/app.js"></script>
</body>
</html>
