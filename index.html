<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OpenScan-AI Pro</title>
    
    <script>console.log("✅ index.html v4.0 (Editor Suite) loaded");</script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#141218">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/style.css">

    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
</head>
<body>
    <div id="app-container">
        <video id="video-feed" autoplay playsinline muted></video>
        
        <canvas id="overlay-canvas"></canvas>

        <div id="focus-ring"></div>

        <div class="ui-layer">
            <div class="top-bar">
                <div class="bar-left"><button id="settings-btn" class="icon-btn material-symbols-outlined">settings</button></div>
                <div class="bar-center">
                    <div id="auto-toggle" class="chip">
                        <span class="material-symbols-outlined">shutter_speed</span>
                        <span id="auto-text">Auto</span>
                    </div>
                </div>
                <div class="bar-right"><div id="status-msg" class="status-pill">Ready</div></div>
            </div>

            <div class="bottom-bar">
                <div class="bar-left">
                    <div id="gallery-trigger" class="thumbnail-btn">
                        <span class="material-symbols-outlined placeholder-icon">photo_library</span>
                        <img id="last-scan-img" src="" style="display:none;">
                        <span id="scan-count" class="badge" style="display:none;">0</span>
                    </div>
                </div>
                <div class="bar-center">
                    <div class="shutter-container">
                        <svg class="progress-ring" width="88" height="88">
                            <circle class="progress-ring__circle" stroke="#D0BCFF" stroke-width="4" fill="transparent" r="40" cx="44" cy="44"/>
                        </svg>
                        <button id="capture-btn"></button>
                    </div>
                </div>
                <div class="bar-right">
                    <button id="export-btn" class="fab-small">
                        <span class="material-symbols-outlined">picture_as_pdf</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="freeze-layer"></div>

        <div id="crop-modal" class="modal-sheet">
            <div class="sheet-header">
                <button id="cancel-crop" class="text-btn">Cancel</button>
                <span class="sheet-title">Adjust</span>
                <button id="done-crop" class="text-btn primary">Done</button>
            </div>
            <div class="crop-area">
                <div class="crop-container" id="crop-ui-container">
                    <canvas id="crop-canvas"></canvas>
                    <div class="crop-handle"></div><div class="crop-handle"></div>
                    <div class="crop-handle"></div><div class="crop-handle"></div>
                </div>
            </div>
        </div>

        <div id="gallery-modal" class="modal-sheet full-height">
            <div class="sheet-header">
                <button id="close-gallery" class="icon-btn material-symbols-outlined">arrow_back</button>
                <span class="sheet-title">Scans</span>
                <div style="width: 48px;"></div>
            </div>
            <div id="gallery-grid" class="gallery-grid"></div>
        </div>

        <div id="editor-modal" class="modal-sheet full-height">
            <div class="sheet-header">
                <button id="close-editor" class="icon-btn material-symbols-outlined">arrow_back</button>
                <span class="sheet-title">Editor</span>
                <button id="save-editor" class="text-btn primary" style="font-weight:bold;">Save</button>
            </div>
            
            <div class="editor-view">
                <img id="editor-img" src="">
            </div>

            <div class="editor-suite">
                <div class="scroll-toolbar">
                    <button class="tool-btn" onclick="performRetake()">
                        <span class="material-symbols-outlined icon-box">camera_alt</span>
                        <label>Retake</label>
                    </button>
                    <button class="tool-btn" onclick="startReCrop()">
                        <span class="material-symbols-outlined icon-box">crop</span>
                        <label>Re-Crop</label>
                    </button>
                    
                    <div class="divider"></div>

                    <button class="tool-btn" onclick="applyFilter('magic')">
                        <span class="material-symbols-outlined icon-box" style="color:#D0BCFF;">auto_fix_high</span>
                        <label>Magic</label>
                    </button>
                    <button class="tool-btn" onclick="applyFilter('bw')">
                        <span class="material-symbols-outlined icon-box">contrast</span>
                        <label>B&W</label>
                    </button>
                    <button class="tool-btn" onclick="applyFilter('gray')">
                        <span class="material-symbols-outlined icon-box">filter_b_and_w</span>
                        <label>Gray</label>
                    </button>
                    <button class="tool-btn" onclick="applyFilter('original')">
                        <span class="material-symbols-outlined icon-box">restart_alt</span>
                        <label>Reset</label>
                    </button>

                    <div class="divider"></div>

                    <button class="tool-btn" onclick="applyFilter('lighten')">
                        <span class="material-symbols-outlined icon-box">light_mode</span>
                        <label>Lighten</label>
                    </button>
                    <button class="tool-btn" onclick="applyFilter('darken')">
                        <span class="material-symbols-outlined icon-box">dark_mode</span>
                        <label>Darken</label>
                    </button>
                    <button class="tool-btn" onclick="applyFilter('sharpen')">
                        <span class="material-symbols-outlined icon-box">hdr_strong</span>
                        <label>Sharpen</label>
                    </button>
                    <button class="tool-btn" onclick="applyFilter('invert')">
                        <span class="material-symbols-outlined icon-box">invert_colors</span>
                        <label>Invert</label>
                    </button>

                    <div class="divider"></div>

                    <button class="tool-btn" onclick="rotateImage(-90)">
                        <span class="material-symbols-outlined icon-box">rotate_left</span>
                        <label>Left</label>
                    </button>
                    <button class="tool-btn" onclick="rotateImage(90)">
                        <span class="material-symbols-outlined icon-box">rotate_right</span>
                        <label>Right</label>
                    </button>
                    <button class="tool-btn" onclick="flipImage()">
                        <span class="material-symbols-outlined icon-box">flip</span>
                        <label>Mirror</label>
                    </button>

                    <div class="divider"></div>

                    <button class="tool-btn" onclick="extractText()">
                        <span class="material-symbols-outlined icon-box">text_snippet</span>
                        <label>OCR</label>
                    </button>
                    <button class="tool-btn destuctive" onclick="deleteCurrentPage()">
                        <span class="material-symbols-outlined icon-box" style="background:#3b1f1f; color:#ffb4ab;">delete</span>
                        <label>Delete</label>
                    </button>
                </div>
            </div>
        </div>

        <div id="settings-modal" class="modal-sheet">
            <div class="sheet-drag-handle"></div>
            <div class="sheet-content">
                <h2>Settings</h2>
                <div class="list-item">
                    <div class="list-text"><span class="list-title">Quality</span></div>
                    <select id="quality-select" class="m3-select">
                        <option value="4k">4K (Ultra)</option>
                        <option value="1080p" selected>1080p</option>
                        <option value="720p">720p</option>
                    </select>
                </div>
                <div class="list-item">
                    <div class="list-text"><span class="list-title">Auto Speed</span></div>
                    <select id="auto-speed" class="m3-select">
                        <option value="10">Fast</option>
                        <option value="20" selected>Normal</option>
                        <option value="45">Slow</option>
                    </select>
                </div>
                <div class="list-item">
                    <div class="list-text"><span class="list-title">Auto-Enhance</span></div>
                    <label class="switch"><input type="checkbox" checked><span class="slider round"></span></label>
                </div>
                <div class="input-group">
                    <label>PDF Password</label>
                    <input type="password" id="pdf-password" class="m3-input" placeholder="Optional...">
                </div>
                <div class="btn-group" style="margin-top: 20px;">
                    <button id="tutorial-btn" class="btn-tonal"><span class="material-symbols-outlined">menu_book</span>Guide</button>
                    <button id="about-btn" class="btn-tonal"><span class="material-symbols-outlined">info</span>About</button>
                </div>
                <button id="close-settings" class="btn-filled" style="margin-top:10px;">Done</button>
            </div>
        </div>

        <div id="tutorial-modal" class="modal-sheet full-height">
            <div class="sheet-header"><button id="close-tutorial" class="icon-btn material-symbols-outlined">close</button><span class="sheet-title">Guide</span><div style="width:48px;"></div></div>
            <div class="sheet-content scrollable">
                <div class="card"><h3>1. Scan</h3><p>Align document in the blue box.</p></div>
                <div class="card"><h3>2. Edit Suite</h3><p>Use Magic Fix, Re-Crop, or Filters.</p></div>
                <div class="card"><h3>3. Export</h3><p>Save as PDF or share images.</p></div>
            </div>
        </div>
        <div id="about-modal" class="modal-sheet">
            <div class="sheet-drag-handle"></div>
            <div class="sheet-content center-text"><h2>OpenScan AI</h2><div class="donate-card" style="background:#211F26;padding:20px;border-radius:16px;margin-top:20px;"><a href="https://buymeacoffee.com/theminescout" target="_blank" class="btn-filled gold">☕ Support Dev</a></div><button id="close-about" class="text-btn" style="margin-top:20px;">Close</button></div>
        </div>
        <div id="text-result-modal" class="modal-sheet full-height">
            <div class="sheet-header"><button onclick="document.getElementById('text-result-modal').style.display='none'" class="icon-btn material-symbols-outlined">close</button><span class="sheet-title">Text</span><button onclick="copyOCRText()" class="text-btn primary">Copy</button></div>
            <div class="sheet-content full-height"><textarea id="ocr-result-area" class="m3-textarea"></textarea></div>
        </div>

    </div>
    <canvas id="hidden-canvas" style="display:none;"></canvas>
    <script src="js/app.js"></script>
</body>
</html>
