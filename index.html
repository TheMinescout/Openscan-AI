<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OpenScan-AI Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <link rel="stylesheet" href="css/style.css">

    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div id="app-container">
        <video id="video-feed" autoplay playsinline muted></video>
        
        <canvas id="overlay-canvas"></canvas>

        <div class="ui-layer">
            <div class="top-nav">
                <button id="delete-last-btn" class="glass-btn" title="Delete Last Scan" style="opacity:0">🗑️</button>
                
                <div id="status-msg" class="status-pill">Initializing...</div>
                
                <button id="settings-btn" class="glass-btn" title="Settings">⚙️</button>
            </div>

            <div class="bottom-nav">
                <div id="gallery-trigger" class="preview-box">
                    <img id="last-scan-img" src="" style="display:none;">
                    <div id="scan-count">0</div>
                </div>

                <div class="shutter-outer">
                    <button id="capture-btn" aria-label="Capture Document"></button>
                </div>

                <button id="export-btn" class="glass-btn primary-action">PDF</button>
            </div>
        </div>

        <div id="freeze-layer"></div>

        <div id="crop-modal" class="modal">
            <div class="modal-header">
                <button id="cancel-crop">Retake</button>
                <span class="modal-title">Adjust Corners</span>
                <button id="done-crop" class="primary-text">Warp & Keep</button>
            </div>
            <div class="crop-container" id="crop-ui-container">
                <canvas id="crop-canvas"></canvas>
                <div class="crop-handle"></div>
                <div class="crop-handle"></div>
                <div class="crop-handle"></div>
                <div class="crop-handle"></div>
            </div>
        </div>

        <div id="gallery-modal" class="modal">
            <div class="modal-header">
                <button id="close-gallery">← Back</button>
                <span class="modal-title">Scanned Pages</span>
                <div style="width: 30px;"></div> </div>
            <div id="gallery-grid" class="gallery-grid"></div>
        </div>

        <div id="editor-modal" class="modal" style="background: #000;">
            <div class="modal-header">
                <button id="close-editor">Close</button>
                <span class="modal-title">Edit Page</span>
                <button id="delete-page-btn" style="color: var(--danger);">Delete</button>
            </div>
            <div class="editor-view">
                <img id="editor-img" src="">
            </div>
        </div>

        <div id="settings-modal" class="modal">
            <div class="modal-header">
                <button id="close-settings">Done</button>
                <span class="modal-title">Settings</span>
                <div style="width: 30px;"></div>
            </div>
            <div class="settings-content" style="padding: 20px; color: white;">
                <div class="setting-item">
                    <label>High Resolution</label>
                    <input type="checkbox" checked>
                </div>
                <hr style="border-color: #333; margin: 15px 0;">
                <div class="setting-item">
                    <label>Auto-Enhance</label>
                    <input type="checkbox" checked>
                </div>
                <div class="setting-item">
                    <label>Flash on Capture</label>
                    <input type="checkbox">
                </div>
                <p style="margin-top: 30px; color: #666; font-size: 12px; text-align: center;">
                    OpenScan Pro v1.0<br>
                    Running Offline
                </p>
            </div>
        </div>

    </div> <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script src="js/app.js"></script>
</body>
</html>
