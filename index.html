<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenScan-AI | Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
</head>
<body>
    <div id="app-container">
        <div class="top-bar">
            <button id="delete-last-btn" class="icon-btn-small">🗑️</button>
            <div class="status-indicator" id="status-msg">Scanner Ready</div>
            <button id="export-btn" class="text-btn">Save PDF</button>
        </div>

        <video id="video-feed" autoplay playsinline muted></video>
        <canvas id="overlay-canvas"></canvas>
        <canvas id="hidden-canvas" style="display:none;"></canvas>
        <div id="freeze-layer"></div>

        <div class="controls">
            <div id="gallery-trigger" class="thumbnail-preview">
                <img id="last-scan-img" src="" style="display:none;">
                <span id="scan-count">0</span>
            </div>
            <button id="capture-btn"></button>
            <div class="spacer"></div>
        </div>

        <div id="crop-modal" class="modal">
            <div class="modal-header">
                <button id="cancel-crop">Retake</button>
                <span>Crop Document</span>
                <button id="done-crop" class="primary-text">Keep</button>
            </div>
            <div class="crop-container" id="crop-ui-container">
                <canvas id="crop-canvas"></canvas>
                <div id="handle-0" class="crop-handle"></div>
                <div id="handle-1" class="crop-handle"></div>
                <div id="handle-2" class="crop-handle"></div>
                <div id="handle-3" class="crop-handle"></div>
            </div>
        </div>

        <div id="gallery-modal" class="modal">
            <div class="modal-header">
                <button id="close-gallery">← Back</button>
                <span>Scanned Pages</span>
                <div style="width:50px"></div>
            </div>
            <div id="gallery-content" class="gallery-grid"></div>
        </div>

        <div id="editor-modal" class="modal">
            <div class="modal-header">
                <button id="close-editor">Close</button>
                <button id="delete-current-btn" style="color: #FF3B30;">Delete Page</button>
            </div>
            <div class="editor-view">
                <img id="editor-img" src="">
            </div>
            <div class="editor-footer">
                <button class="text-btn" onclick="alert('Filters coming soon!')">Magic Color</button>
                <button class="text-btn" onclick="alert('Rotate coming soon!')">Rotate</button>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
